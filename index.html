<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SilatApp ⚔️</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A0A3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SilatApp">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A0A3E;--bg2:#2D1060;
  --panel:#0D0628;--panel2:#180840;
  --txt:#FFFFFF;--muted:#C8AAFF;
  --nav-h:68px;--bar:env(safe-area-inset-bottom,0px);
  --rad:16px;--rad-btn:14px;
  --font-h:'Lilita One',cursive;--font-b:'Nunito',sans-serif;
  /* 7 warna game */
  --c1:#FF6B35;--c1d:#CC4400;--c1s:0 6px 0 #882200,0 10px 20px rgba(255,107,53,.3);
  --c2:#FFD700;--c2d:#CC9900;--c2s:0 6px 0 #886600,0 10px 20px rgba(255,215,0,.3);
  --c3:#00C853;--c3d:#007A2F;--c3s:0 6px 0 #004A1A,0 10px 20px rgba(0,200,83,.3);
  --c4:#2979FF;--c4d:#004DBB;--c4s:0 6px 0 #002E88,0 10px 20px rgba(41,121,255,.3);
  --c5:#AA00FF;--c5d:#6600CC;--c5s:0 6px 0 #440088,0 10px 20px rgba(170,0,255,.3);
  --c6:#FF1744;--c6d:#CC0022;--c6s:0 6px 0 #880011,0 10px 20px rgba(255,23,68,.3);
  --c7:#00BCD4;--c7d:#007A8A;--c7s:0 6px 0 #004A55,0 10px 20px rgba(0,188,212,.3);
}
[data-theme="light"]{
  --bg:#E8F4FF;--bg2:#F0E8FF;
  --panel:#FFFFFF;--panel2:#F5F0FF;
  --txt:#1A1A3E;--muted:#5566AA;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;font-family:var(--font-b);background:radial-gradient(ellipse at top,var(--bg2) 0%,var(--bg) 60%);color:var(--txt);overflow:hidden;transition:.3s}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:var(--font-b)}

/* ── Stars background ── */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.15) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;z-index:1}
@media(min-width:481px){#app{max-width:960px}}

/* ── Header ── */
#header{background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border-bottom:2px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;height:54px;z-index:100}
#header h1{font-family:var(--font-h);font-size:22px;flex:1;background:linear-gradient(90deg,#FFD700,#FF6B35,#FF1744);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
.hdr-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}

/* ── Main area ── */
#main{flex:1;overflow:hidden;position:relative}

/* ── Dashboard Game Grid ── */
#dashboard-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  gap:10px;padding:12px;
  height:100%;align-content:center;
}
@media(min-width:481px){#dashboard-grid{grid-template-columns:repeat(3,1fr);max-width:600px;margin:0 auto;padding:20px}}

.game-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;border-radius:var(--rad-btn);padding:14px 8px;
  border:3px solid rgba(255,255,255,.3);border-bottom-width:6px;
  cursor:pointer;transition:.1s;position:relative;overflow:hidden;
  min-height:100px;
}
.game-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.15);border-radius:var(--rad-btn) var(--rad-btn) 50% 50%}
.game-btn:active{transform:translateY(4px);border-bottom-width:2px}
.game-ikon{font-size:36px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));position:relative;z-index:1}
.game-lbl{font-family:var(--font-h);font-size:13px;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);position:relative;z-index:1;text-align:center;line-height:1.2}
.game-badge{position:absolute;top:6px;right:6px;background:#FF1744;border-radius:99px;font-size:10px;font-weight:900;color:#fff;padding:1px 6px;font-family:var(--font-h)}

.c1{background:linear-gradient(160deg,#FF8C42,var(--c1));box-shadow:var(--c1s);border-color:rgba(255,255,255,.35)}
.c2{background:linear-gradient(160deg,#FFE566,var(--c2));box-shadow:var(--c2s);border-color:rgba(255,255,255,.35)}
.c3{background:linear-gradient(160deg,#00E676,var(--c3));box-shadow:var(--c3s);border-color:rgba(255,255,255,.35)}
.c4{background:linear-gradient(160deg,#448AFF,var(--c4));box-shadow:var(--c4s);border-color:rgba(255,255,255,.35)}
.c5{background:linear-gradient(160deg,#CC44FF,var(--c5));box-shadow:var(--c5s);border-color:rgba(255,255,255,.35)}
.c6{background:linear-gradient(160deg,#FF5177,var(--c6));box-shadow:var(--c6s);border-color:rgba(255,255,255,.35)}
.c7{background:linear-gradient(160deg,#00E5FF,var(--c7));box-shadow:var(--c7s);border-color:rgba(255,255,255,.35)}

/* ── Page Container ── */
#page-container{
  position:absolute;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(8px);
  display:none;flex-direction:column;
  overflow:hidden;z-index:50;
}
#page-container.buka{display:flex}
#page-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border-bottom:2px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
#page-header-title{font-family:var(--font-h);font-size:18px;color:#fff;flex:1}
.btn-balik{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
#page-content{flex:1;overflow-y:auto;padding:14px}

/* ── Page Cards ── */
.kad{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:14px;margin-bottom:10px;backdrop-filter:blur(4px)}
.kad-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* ── Stat kad ── */
.stat-kad{border-radius:14px;padding:14px 14px 16px;display:flex;flex-direction:column;gap:5px;transition:.1s;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.2);cursor:default}
.stat-kad::after{content:'';position:absolute;top:-15px;right:-15px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.1)}
.stat-kad:active{transform:translateY(3px)}
.stat-num{font-family:var(--font-h);font-size:30px;color:#fff;line-height:1}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.85);font-weight:700}
.stat-kad.g{background:linear-gradient(135deg,#00E676,var(--c3));box-shadow:var(--c3s)}
.stat-kad.b{background:linear-gradient(135deg,#448AFF,var(--c4));box-shadow:var(--c4s)}
.stat-kad.o{background:linear-gradient(135deg,#FF8C42,var(--c1));box-shadow:var(--c1s)}
.stat-kad.r{background:linear-gradient(135deg,#FF5177,var(--c6));box-shadow:var(--c6s)}
.stat-kad.p{background:linear-gradient(135deg,#CC44FF,var(--c5));box-shadow:var(--c5s)}
.stat-kad.y{background:linear-gradient(135deg,#FFE566,var(--c2));box-shadow:var(--c2s)}

/* ── Seksyen Tajuk ── */
.seksyen-tajuk{font-family:var(--font-h);font-size:14px;color:rgba(255,255,255,.6);margin:16px 0 8px;letter-spacing:.3px}

/* ── Senarai Item ── */
.senarai-item{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.1s}
.senarai-item:active{transform:scale(.97);background:rgba(255,255,255,.12)}

/* ── Avatar ── */
.avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.avatar.g{background:rgba(0,200,83,.25)}
.avatar.b{background:rgba(41,121,255,.25)}
.avatar.p{background:rgba(170,0,255,.25)}
.avatar.o{background:rgba(255,107,53,.25)}
.avatar.y{background:rgba(255,215,0,.25)}
.avatar.r{background:rgba(255,23,68,.25)}
.avatar{background:rgba(255,255,255,.1)}
.item-info{flex:1;min-width:0}
.item-nama{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.item-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Badge ── */
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;white-space:nowrap}
.badge.hijau{background:rgba(0,200,83,.25);color:#00E676;border:1px solid rgba(0,200,83,.4)}
.badge.merah{background:rgba(255,23,68,.25);color:#FF5177;border:1px solid rgba(255,23,68,.4)}
.badge.pur{background:rgba(170,0,255,.25);color:#CC44FF;border:1px solid rgba(170,0,255,.4)}
.badge.abu{background:rgba(255,255,255,.1);color:var(--muted);border:1px solid rgba(255,255,255,.15)}
.badge.kuning{background:rgba(255,215,0,.25);color:#FFE566;border:1px solid rgba(255,215,0,.4)}
.badge.biru{background:rgba(41,121,255,.25);color:#448AFF;border:1px solid rgba(41,121,255,.4)}

/* ── Butang ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-family:var(--font-h);font-size:14px;transition:.1s;cursor:pointer;border:2px solid rgba(255,255,255,.3);border-bottom-width:4px;color:#fff}
.btn:active{transform:translateY(3px);border-bottom-width:1px}
.btn-pri{background:linear-gradient(160deg,#00E676,var(--c3));box-shadow:var(--c3s)}
.btn-outline{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.btn-red{background:linear-gradient(160deg,#FF5177,var(--c6));box-shadow:var(--c6s)}
.btn-blok{display:flex;width:100%}
.btn-fab{position:absolute;bottom:16px;right:16px;width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#00E676,var(--c3));color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--c3s);z-index:60;cursor:pointer;transition:.1s;border:2px solid rgba(255,255,255,.3);border-bottom-width:5px}
.btn-fab:active{transform:translateY(4px);border-bottom-width:1px}

/* ── Input ── */
.form-kump{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:11px 13px;border:2px solid rgba(255,255,255,.15);border-radius:10px;font-size:14px;font-weight:700;color:#fff;background:rgba(255,255,255,.08);outline:none;transition:.2s}
.form-input:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 0 3px rgba(255,215,0,.15)}
select.form-input option{background:#1A0A3E;color:#fff}
select.form-input{appearance:none}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.25s;backdrop-filter:blur(6px)}
.modal-bg.buka{opacity:1;pointer-events:all}
.modal{background:linear-gradient(160deg,#1E0850,#0D0428);border:2px solid rgba(255,215,0,.3);border-radius:20px 20px 0 0;border-bottom:none;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px calc(16px + var(--bar));transform:translateY(100%);transition:.3s cubic-bezier(.4,0,.2,1)}
.modal-bg.buka .modal{transform:translateY(0)}
.modal-tajuk{font-family:var(--font-h);font-size:18px;color:#FFD700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;text-shadow:0 0 10px rgba(255,215,0,.4)}
.modal-tutup{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);cursor:pointer}

/* ── Carian ── */
.kotak-carian{position:relative;margin-bottom:12px}
.kotak-carian i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#FFD700;font-size:18px}
.kotak-carian input{width:100%;padding:11px 12px 11px 40px;border:2px solid rgba(255,215,0,.25);border-radius:10px;font-size:14px;font-weight:700;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:.2s}
.kotak-carian input:focus{border-color:rgba(255,215,0,.6)}

/* ── Toggle Hadir ── */
.toggle-hadir{width:46px;height:27px;border-radius:99px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.toggle-hadir.on{background:var(--c3);border-color:rgba(255,255,255,.4);box-shadow:0 0 10px rgba(0,200,83,.4)}
.toggle-hadir::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s}
.toggle-hadir.on::after{transform:translateX(19px)}
.item-kehadiran{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.item-kehadiran:last-child{border-bottom:none}

/* ── Tarikh Bar ── */
.tarikh-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:2px solid rgba(255,215,0,.25);border-radius:10px;padding:10px 14px;margin-bottom:12px}
.tarikh-bar i{color:#FFD700;font-size:20px}
.tarikh-bar input{border:none;outline:none;font-size:14px;font-weight:800;color:#FFD700;flex:1;background:transparent}
.tarikh-bar input::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(5) hue-rotate(10deg)}

/* ── Profil Header ── */
.profil-header{background:linear-gradient(135deg,#2979FF,#AA00FF);padding:20px;border-radius:16px;margin-bottom:12px;border:2px solid rgba(255,255,255,.2);box-shadow:0 8px 0 rgba(0,0,150,.4),0 12px 20px rgba(41,121,255,.3)}
.profil-nama{font-family:var(--font-h);font-size:15px;color:#fff;margin-bottom:4px}
.profil-id{font-size:11px;color:rgba(255,255,255,.75)}
.profil-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:800;margin-top:8px}
.maklumat-baris{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.08);align-items:flex-start}
.maklumat-baris:last-child{border-bottom:none}
.maklumat-baris i{color:#FFD700;font-size:18px;flex-shrink:0;margin-top:1px}
.maklumat-baris .lbl{font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:800;text-transform:uppercase}
.maklumat-baris .val{font-size:14px;font-weight:800;color:#fff}

/* ── Gred ── */
.gred-item{display:flex;gap:12px}
.gred-garis{display:flex;flex-direction:column;align-items:center}
.gred-dot{width:12px;height:12px;border-radius:3px;background:#FFD700;flex-shrink:0;margin-top:4px;box-shadow:0 0 6px rgba(255,215,0,.5)}
.gred-line{width:2px;flex:1;background:rgba(255,255,255,.1);min-height:20px}
.gred-content{flex:1;padding-bottom:16px}
.gred-bengkung{font-weight:800;font-size:14px;color:#fff}
.gred-tarikh{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Silibus ── */
.silibus-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-bottom:8px}
.silibus-ikon{width:42px;height:42px;border-radius:10px;background:rgba(0,200,83,.2);color:#00E676;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.silibus-nama{font-weight:800;font-size:14px;color:#fff}
.silibus-kat{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Sedekah ── */
.btn-sedekah{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:12px;font-family:var(--font-h);font-size:13px;background:linear-gradient(160deg,#FFE566,var(--c2));color:#333;border:2px solid rgba(255,255,255,.3);border-bottom-width:4px;box-shadow:var(--c2s);cursor:pointer;width:100%;margin-bottom:12px;transition:.1s}
.btn-sedekah:active{transform:translateY(3px);border-bottom-width:1px}

/* ── Loading & Empty ── */
.muat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:12px;color:var(--muted)}
.muat i{font-size:32px;animation:spin 1s linear infinite;color:#FFD700}
@keyframes spin{to{transform:rotate(360deg)}}
.kosong{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:10px;color:var(--muted);text-align:center}
.kosong i{font-size:48px}
.kosong p{font-size:14px;font-weight:700}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#1E0850,#2D1060);border:2px solid rgba(255,215,0,.4);color:#FFD700;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:800;z-index:999;opacity:0;transition:.3s;white-space:nowrap;max-width:90vw;box-shadow:0 8px 0 rgba(0,0,0,.3)}
#toast.nampak{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(0,200,83,.5);color:#00E676}
#toast.ralat{border-color:rgba(255,23,68,.5);color:#FF5177}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="btn-kembali" class="hdr-btn" onclick="tutupPage()" style="display:none"><i class="ti ti-arrow-left"></i></div>
    <h1 id="tajuk-hdr">⚔️ SilatApp</h1>
    <div class="hdr-btn" id="btn-darkmode" onclick="togDarkMode()"><i class="ti ti-moon" id="ikon-darkmode"></i></div>
    <div class="hdr-btn" onclick="muatSemula()"><i class="ti ti-refresh"></i></div>
  </header>

  <main id="main">
    <!-- Dashboard Game Grid -->
    <div id="dashboard-grid">
      <div class="game-btn c4" onclick="bukaPage('ahli','🥷 Ahli')">
        <span class="game-ikon">🥷</span>
        <span class="game-lbl">PESILAT</span>
      </div>
      <div class="game-btn c3" onclick="bukaPage('kehadiran','⚔️ Kehadiran')">
        <span class="game-ikon">⚔️</span>
        <span class="game-lbl">HADIR</span>
      </div>
      <div class="game-btn c5" onclick="bukaPage('yuran','💎 Yuran')">
        <span class="game-ikon">💎</span>
        <span class="game-lbl">YURAN</span>
      </div>
      <div class="game-btn c1" onclick="bukaPage('profil_pesilat','📊 Profil')">
        <span class="game-ikon">📊</span>
        <span class="game-lbl">PROFIL</span>
      </div>
      <div class="game-btn c2" onclick="bukaPage('sejarah_gred','🏅 Gred')">
        <span class="game-ikon">🏅</span>
        <span class="game-lbl">GRED</span>
      </div>
      <div class="game-btn c7" onclick="bukaPage('silibus','📖 Silibus')">
        <span class="game-ikon">📖</span>
        <span class="game-lbl">SILIBUS</span>
      </div>
      <div class="game-btn" style="background:linear-gradient(160deg,#FF8C42,#FF4500);box-shadow:0 6px 0 #882200,0 10px 20px rgba(255,69,0,.3);border:2px solid rgba(255,255,255,.3);border-bottom-width:6px" onclick="window.open('laporan.html','_blank')">
        <span class="game-ikon">📋</span>

// ── Format tarikh ─────────────────────────────────────────────
function formatTarikh(val) {
  if (!val || val === 'undefined' || val === '') return '—';
  const d = new Date(val);
  if (!isNaN(d.getTime())) {
    return d.getDate().toString().padStart(2,'0') + '/' +
           (d.getMonth()+1).toString().padStart(2,'0') + '/' +
           d.getFullYear();
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(val)) {
    const p = val.substring(0,10).split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  }
  return String(val);
}

// ── Pembantu API (JSONP — fix CORS) ──────────────────────────
function api(tindakan, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const url    = new URL(API_URL);
    url.searchParams.set('tindakan', tindakan);
    url.searchParams.set('callback', cbName);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
    const timer = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      reject(new Error('Masa tamat — periksa sambungan internet'));
    }, 20000);
    window[cbName] = (json) => {
      clearTimeout(timer);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      if (json.ok) resolve(json.data);
      else reject(new Error(json.error || 'Ralat API'));
    };
    const script   = document.createElement('script');
    script.id      = cbName;
    script.src     = url.toString();
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      reject(new Error('Gagal sambung ke pelayan'));
    };
    document.head.appendChild(script);
  });
}

function apiPost(data) {
  return new Promise((resolve, reject) => {
    const cbName = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const url    = new URL(API_URL);
    url.searchParams.set('callback', cbName);
    url.searchParams.set('_data', JSON.stringify(data));
    const timer = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      reject(new Error('Masa tamat'));
    }, 20000);
    window[cbName] = (json) => {
      clearTimeout(timer);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      if (json.ok) resolve(json.data);
      else reject(new Error(json.error || 'Ralat API'));
    };
    const script   = document.createElement('script');
    script.id      = cbName;
    script.src     = url.toString();
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      reject(new Error('Gagal hantar data'));
    };
    document.head.appendChild(script);
  });
}

// ── Toast ────────────────────────────────────────────────────

  const el = document.getElementById('toast');

  clearTimeout(toastTimer);

// ── Dark Mode ────────────────────────────────────────────────
function togDark() {
  const isDark = document.documentElement.hasAttribute('data-dark');
  if (isDark) {
    document.documentElement.removeAttribute('data-dark');
    document.getElementById('dark-icon').className = 'ti ti-moon-stars';
    localStorage.setItem('silatapp-dark', '0');
  } else {
    document.documentElement.setAttribute('data-dark', '');
    document.getElementById('dark-icon').className = 'ti ti-sun';
    localStorage.setItem('silatapp-dark', '1');
  }
}
// Load dark mode preference
if (localStorage.getItem('silatapp-dark') === '1') {
  document.documentElement.setAttribute('data-dark', '');
  document.addEventListener('DOMContentLoaded', () => {
    const icon = document.getElementById('dark-icon');

          <div style="font-weight:600">Senarai Ahli (<span id="jum-hadir">0</span> hadir)</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline" style="padding:6px 12px;font-size:12px" onclick="tandaSemuaHadir()">Semua Hadir</button>

function renderSenaraiKehadiran() {
  const senarai = dataAhliCache || [];
  const el = document.getElementById('senarai-kehadiran');
  if (!el) return;

  senarai.forEach(a => { if (!statusHadir[a.no_kp]) statusHadir[a.no_kp] = false; });

  el.innerHTML = senarai.map(a => `
    <div class="item-kehadiran" id="item-${a.no_kp}">
      <div class="toggle-hadir ${statusHadir[a.no_kp]?'on':''}" id="tog-${a.no_kp}" onclick="togHadir('${a.no_kp}')"></div>
      <div class="item-info">
        <div class="item-nama">${a.nama}</div>
        <div class="item-sub">${a.bengkung||'—'}</div>
      </div>
      <span class="badge ${statusHadir[a.no_kp]?'hijau':'abu'}" id="bdg-${a.no_kp}">${statusHadir[a.no_kp]?'HADIR':'—'}</span>
    </div>
  `).join('');

  kemaskiniJumHadir();
}

async function muatStatusHadir() {
  const tarikh = document.getElementById('inp-tarikh-hadir')?.value;
  if (!tarikh) return;
  try {
    const rekod = await api('kehadiran', {tarikh});
    rekod.forEach(r => { statusHadir[r.NO_KP] = r.STATUS_KEHADIRAN === 'HADIR'; });
    renderSenaraiKehadiran();
  } catch (e) { /* senyap */ }
}

function togHadir(no_kp) {
  statusHadir[no_kp] = !statusHadir[no_kp];
  const tog = document.getElementById('tog-' + no_kp);
  const bdg = document.getElementById('bdg-' + no_kp);
  if (tog) tog.classList.toggle('on', statusHadir[no_kp]);
  if (bdg) { bdg.className = 'badge ' + (statusHadir[no_kp] ? 'hijau' : 'abu'); bdg.textContent = statusHadir[no_kp] ? 'HADIR' : '—'; }
  kemaskiniJumHadir();
}

function tandaSemuaHadir() {
  (dataAhliCache||[]).forEach(a => { statusHadir[a.no_kp] = true; });
  renderSenaraiKehadiran();
}

function kemaskiniJumHadir() {
  const jum = Object.values(statusHadir).filter(Boolean).length;
  const el  = document.getElementById('jum-hadir');
  if (el) el.textContent = jum;
}

async function simpanKehadiran() {
  const tarikh = document.getElementById('inp-tarikh-hadir')?.value;
  const masa   = new Date().toTimeString().slice(0,5);
  const btn    = document.getElementById('btn-simpan-hadir');
  const senarai= dataAhliCache || [];

  if (!senarai.length) { tunjukToast('Tiada ahli untuk direkodkan', 'ralat'); return; }

  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Menyimpan...';

  const rekod = senarai.map(a => ({ no_kp: a.no_kp, status: statusHadir[a.no_kp] ? 'HADIR' : 'TIDAK HADIR' }));

  try {
    await apiPost({ tindakan:'rekod_kehadiran', rekod, tarikh, masa });
    tunjukToast('Kehadiran berjaya disimpan!', 'ok');
  } catch (e) {
    tunjukToast('Gagal: ' + e.message, 'ralat');
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> Simpan Kehadiran';
  }
}

    `;

function pilihDariDropdown(noKp) {
  if (!noKp) { paparJadualPesilat(dataPesilat); return; }
  document.getElementById('carian-pesilat').value = '';
  const hasil = dataPesilat.filter(a => a.no_kp === noKp);
  paparJadualPesilat(hasil);
}

let timerCariPesilat;
function tapisPesilat(q) {
  clearTimeout(timerCariPesilat);
  carianPesilat = q;
  document.getElementById('pilih-pesilat').value = '';
  timerCariPesilat = setTimeout(() => {
    if (!dataPesilat) return;
    const hasil = q ? dataPesilat.filter(a =>
      a.nama.toLowerCase().includes(q.toLowerCase()) || a.no_kp.includes(q)
    ) : dataPesilat;
    paparJadualPesilat(hasil);
  }, 250);
}

function kiraUsiaDariKP(tarikhLahir, noKp) {
  let tLahir = null;
  if (tarikhLahir && tarikhLahir.length >= 6) { tLahir = new Date(tarikhLahir); }
  else if (noKp && noKp.length >= 6) {
    const yy=parseInt(noKp.substring(0,2)),mm=noKp.substring(2,4),dd=noKp.substring(4,6);
    tLahir = new Date((yy<=30?2000+yy:1900+yy)+'-'+mm+'-'+dd);
  }
  if (!tLahir || isNaN(tLahir.getTime())) return null;
  const skrg=new Date(); let u=skrg.getFullYear()-tLahir.getFullYear();
  if (skrg.getMonth()<tLahir.getMonth()||(skrg.getMonth()===tLahir.getMonth()&&skrg.getDate()<tLahir.getDate())) u--;
  return u;
}

function paparJadualPesilat(senarai) {
  const el = document.getElementById('jadual-pesilat');
  if (!el) return;
  if (!senarai || !senarai.length) {
    el.innerHTML = '<div class="kosong"><i class="ti ti-user-off"></i><p>Tiada pesilat dijumpai</p></div>';
    return;
  }

  const warnaBMI = bmi => {
    if (!bmi) return '#ccc';
    if (bmi < 18.5) return '#3B8BD4';
    if (bmi < 23)   return '#1D9E75';
    if (bmi < 27.5) return '#BA7517';
    return '#A32D2D';
  };
  const labelBMI = bmi => {
    if (!bmi) return '—';
    if (bmi < 18.5) return 'Kurus';
    if (bmi < 23)   return 'Normal';
    if (bmi < 27.5) return 'Lebih';
    return 'Obes';
  };

  el.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${senarai.length} pesilat dijumpai</div>
    ${senarai.map(a => {
      const usia   = kiraUsiaDariKP(a.tarikh_lahir, a.no_kp);
      const berat  = parseFloat(a.berat) || 0;
      const tinggi = parseFloat(a.tinggi) || 0;
      const bmi    = (berat>0&&tinggi>0) ? Math.round(berat/Math.pow(tinggi/100,2)*10)/10 : null;
      const warna  = a.kategori?.includes('RENDAH')?'var(--pri)':a.kategori?.includes('MENENGAH')?'var(--pur)':'var(--amb)';

      return `
      <div class="kad" style="margin-bottom:10px;padding:14px;cursor:pointer" onclick="bukaProfilAhli('${a.no_kp}')">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div class="avatar" style="background:${warna}25;color:${warna};flex-shrink:0;border:none">${(a.nama||'?')[0]}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.nama}</div>
            <div style="font-size:11px;color:var(--muted)">${a.id_ahli} · ${a.no_kp}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:var(--hint);flex-shrink:0"></i>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:16px;font-weight:700;color:${warna}">${usia !== null ? usia : '—'}</div>
            <div style="font-size:10px;color:var(--muted)">USIA</div>
          </div>
          <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:16px;font-weight:700">${berat > 0 ? berat+'kg' : '—'}</div>
            <div style="font-size:10px;color:var(--muted)">BERAT</div>
          </div>
          <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:16px;font-weight:700">${tinggi > 0 ? tinggi+'cm' : '—'}</div>
            <div style="font-size:10px;color:var(--muted)">TINGGI</div>
          </div>
        </div>

        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span class="badge hijau" style="font-size:10px">${(a.bengkung||'—').replace('BENGKUNG ','')}</span>
          ${bmi ? `<span class="badge" style="font-size:10px;background:${warnaBMI(bmi)}20;color:${warnaBMI(bmi)}">BMI ${bmi} · ${labelBMI(bmi)}</span>` : ''}
        </div>
      </div>`;
    }).join('')}
  `;
}

// ── HALAMAN: Sejarah Gred ────────────────────────────────────
async function renderSejarahGred() {
  const main = getMain();
  try {
    const data = await api('sejarah_gred');
    if (!data.length) {
      main.innerHTML = '<div class="kosong"><i class="ti ti-award"></i><p>Tiada sejarah gred direkodkan lagi</p></div>';
      return;
    }
    const ikutAhli = {};
    data.slice().reverse().forEach(g => {
      if (!ikutAhli[g.NO_KP]) ikutAhli[g.NO_KP] = { nama: g.NAMA_PESILAT, rekod: [] };
      ikutAhli[g.NO_KP].rekod.push(g);
    });
    main.innerHTML = Object.entries(ikutAhli).map(([no_kp, {nama, rekod}]) => `
      <div class="kad" style="margin-bottom:12px">
        <div style="font-weight:700;margin-bottom:12px;font-size:14px">${nama}</div>
        ${rekod.map((g, i, arr) => `
          <div class="gred-item">
            <div class="gred-garis"><div class="gred-dot"></div>${i < arr.length-1 ? '<div class="gred-line"></div>' : ''}</div>
            <div class="gred-content">
              <div class="gred-bengkung">${g.BENGKUNG_BARU}</div>
              <div class="gred-tarikh">${g.TARIKH_NAIK_GRED||'—'}${g.CATATAN?' · '+g.CATATAN:''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  } catch (e) {
    main.innerHTML = `<div class="kosong"><i class="ti ti-wifi-off"></i><p>${e.message}</p></div>`;
  }
}

// ── HALAMAN: Silibus ─────────────────────────────────────────
async function renderSilibus() {
  const main = getMain();
  try {
    const data = await api('silibus');
    const ikonKat = { 'WIRID 700':'ti-book', 'BENGKUNG HITAM':'ti-shield', 'BENGKUNG PUTIH':'ti-shield', 'BENGKUNG BIRU':'ti-shield', 'BENGKUNG HIJAU':'ti-shield', 'BENGKUNG MERAH':'ti-shield', 'TARI TERATAI':'ti-activity', 'PECAHAN IBU GAYONG':'ti-layers', 'SENAMAN KEKUDA':'ti-horse', 'IBU GAYONG':'ti-star' };
    const kumpulan = {};
    data.forEach(s => { const k = s.KATEGORI||'Lain-lain'; if (!kumpulan[k]) kumpulan[k] = []; kumpulan[k].push(s); });

    main.innerHTML = Object.entries(kumpulan).map(([kat, items]) => `
      <div class="seksyen-tajuk">${kat}</div>
      ${items.map(s => `
        <div class="silibus-item" onclick="${s.LINK?`buka('${s.LINK}')`:''}" style="${s.LINK?'cursor:pointer':'cursor:default;opacity:.6'}">
          <div class="silibus-ikon"><i class="ti ${ikonKat[kat]||'ti-file'}"></i></div>
          <div>
            <div class="silibus-nama">${s.TAJUK}</div>
            <div class="silibus-kat">${s.LINK?'Klik untuk buka PDF':'Pautan belum tersedia'}</div>
          </div>
          ${s.LINK?'<i class="ti ti-external-link" style="color:var(--hint);margin-left:auto"></i>':''}
        </div>
      `).join('')}
    `).join('');
  } catch (e) {
    main.innerHTML = `<div class="kosong"><i class="ti ti-wifi-off"></i><p>${e.message}</p></div>`;
  }
}

function buka(url) { window.open(url, '_blank'); }

// ── Modal Helpers ────────────────────────────────────────────
function bukaModal(id) {
  document.getElementById(id).classList.add('buka');
  document.body.style.overflow = 'hidden';
}
function tutupModal(id) {
  document.getElementById(id).classList.remove('buka');
  document.body.style.overflow = '';
}

function bukaModalYuran(no_kp, nama) {
  document.getElementById('yuran-no-kp').value = no_kp;
  document.getElementById('yuran-nama').value  = nama;
  document.getElementById('tajuk-modal-yuran').textContent = 'Yuran — ' + nama.split(' ')[0];
  const sel = document.querySelector('#form-yuran select[name="bulan"]');
  if (sel) Array.from(sel.options).forEach(o => { if (o.value === bulanSkrg) o.selected = true; });
  document.getElementById('yuran-tarikh').value = new Date().toISOString().split('T')[0];
  bukaModal('modal-yuran');
}

function bukaModalGred(no_kp, nama) {
  document.getElementById('gred-no-kp').value = no_kp;
  document.getElementById('tajuk-modal-gred').textContent = 'Naik Gred — ' + nama.split(' ')[0];
  document.querySelector('#form-gred select[name="bengkung_baru"]').value = '';
  bukaModal('modal-gred');
}

// ── Form Handlers ────────────────────────────────────────────
async function hantarDaftar(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn-submit-daftar');
  const data = Object.fromEntries(new FormData(e.target));
  data.tindakan   = 'daftar_ahli';
  data.nama_penuh = data.nama_penuh.toUpperCase();
  data.nama_waris = data.nama_waris?.toUpperCase();

  btn.disabled = true; btn.textContent = 'Mendaftar...';
  try {
    const hasil = await apiPost(data);
    tunjukToast('✓ ' + hasil.nama + ' berjaya didaftarkan!', 'ok');
    tutupModal('modal-daftar');
    e.target.reset();
    dataAhliCache = null;
    if (halamanSkrg === 'ahli') renderSenaraiAhli();
  } catch (err) {
    tunjukToast('Gagal: ' + err.message, 'ralat');
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-user-plus"></i> Daftar Ahli';
  }
}

async function hantarYuran(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn-submit-yuran');
  const data = Object.fromEntries(new FormData(e.target));
  data.tindakan = 'tambah_yuran';

  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    await apiPost(data);
    tunjukToast('Yuran berjaya direkodkan!', 'ok');
    tutupModal('modal-yuran');
  } catch (err) {
    tunjukToast('Gagal: ' + err.message, 'ralat');
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Simpan Bayaran';
  }
}

async function hantarGred(e) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  data.tindakan = 'naik_gred';
  try {
    await apiPost(data);
    tunjukToast('Kenaikan gred berjaya direkodkan!', 'ok');
    tutupModal('modal-gred');
    if (halamanSkrg === 'profil-ahli') renderProfilAhli();
  } catch (err) {
    tunjukToast('Gagal: ' + err.message, 'ralat');
  }
}


// ── Fungsi Sedekah ───────────────────────────────────────────
async function sahkanSedekah() {
  const bulan = bulanSkrg, tahun = tahunSkrg;
  if (!confirm('Tandakan ' + bulan + ' ' + tahun + ' sebagai Bulan Sedekah?\n\nSemua ahli akan ditandakan tiada bayaran bulan ini.')) return;
  try {
    await apiPost({ tindakan:'tambah_yuran', no_kp:'SEDEKAH', jenis_yuran:'SEDEKAH', bulan, tahun, jumlah:0, catatan:'Bulan Sedekah - tiada kutipan' });
    tunjukToast('🎁 ' + bulan + ' ' + tahun + ' ditandakan Bulan Sedekah!', 'ok');
    navigasi('yuran');
  } catch(e) { tunjukToast('Gagal: ' + e.message, 'ralat'); }
}

        <div class="stat-kad y"><div class="stat-num">RM${(d.kutipan_bulan_ini||0).toFixed(0)}</div><div class="stat-lbl">💰 Kutipan ${d.bulan_yuran}</div></div>
        <div class="stat-kad r"><div class="stat-num">${d.belum_bayar}</div><div class="stat-lbl">⚠️ Belum Bayar</div></div>

      <div style="text-align:center;padding:8px 0 4px">

        <span class="badge kuning">Dewasa: ${d.dewasa}</span>

  } catch(e) {}
}

// ── Dark Mode Toggle ──────────────────────────────────────────
function togDarkMode() {
  const isLight = document.body.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.body.removeAttribute('data-theme');
    document.getElementById('ikon-darkmode').className = 'ti ti-moon';
    localStorage.setItem('silatapp-theme', 'dark');
  } else {
    document.body.setAttribute('data-theme', 'light');
    document.getElementById('ikon-darkmode').className = 'ti ti-sun';
    localStorage.setItem('silatapp-theme', 'light');
  }
}

// ── Mula ─────────────────────────────────────────────────────
loadDashboardStats();
(function(){ const t=localStorage.getItem('silatapp-theme'); if(t==='dark'){document.body.setAttribute('data-theme','dark');const i=document.getElementById('ikon-darkmode');if(i)i.className='ti ti-sun';} })();
</script>
