<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SilatApp — Laporan Pesilat</title>
<meta name="theme-color" content="#1A0A3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A0A3E;--bg2:#2D1060;--card:#0D0628;--card2:#180840;
  --border:rgba(255,255,255,.12);--txt:#fff;--muted:#C8AAFF;
  --green:#00C853;--green-d:#007A2F;--green-s:0 5px 0 #004A1A;
  --blue:#2979FF;--blue-s:0 5px 0 #002E88;
  --gold:#FFD700;--gold-s:0 5px 0 #886600;
  --orange:#FF6D00;--orange-s:0 5px 0 #882200;
  --red:#FF1744;--red-s:0 5px 0 #880011;
  --purple:#AA00FF;--purple-s:0 5px 0 #440088;
  --rad:14px;--rad-sm:10px;
  --font-h:'Lilita One',cursive;--font-b:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:var(--font-b);background:radial-gradient(ellipse at top,var(--bg2),var(--bg));color:var(--txt);font-size:15px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:var(--font-b)}

/* ── Layout ── */
#app{max-width:480px;margin:0 auto;padding:0 0 80px;position:relative;z-index:1}
@media(min-width:481px){#app{max-width:700px}}

/* ── Header ── */
#hdr{background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border-bottom:2px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;padding:0 14px;height:54px;position:sticky;top:0;z-index:100}
#hdr h1{font-family:var(--font-h);font-size:18px;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.hdr-btn{width:36px;height:36px;border-radius:var(--rad-sm);background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;text-decoration:none}

/* ── Cards ── */
.kad{background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:var(--rad);padding:14px;margin:12px 14px 0}
.kad-tajuk{font-family:var(--font-h);font-size:14px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ── Gambar Pesilat ── */
#kotak-gambar{display:flex;flex-direction:column;align-items:center;gap:10px}
#pratonton-gambar{width:120px;height:120px;border-radius:var(--rad);border:3px solid var(--gold);object-fit:cover;background:rgba(255,215,0,.1);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden}
#pratonton-gambar img{width:100%;height:100%;object-fit:cover}
.btn-kamera{display:flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,var(--gold),var(--orange));border:2px solid rgba(255,255,255,.3);border-bottom-width:4px;border-radius:var(--rad-sm);font-family:var(--font-h);font-size:13px;color:#fff;cursor:pointer;transition:.1s;box-shadow:var(--orange-s)}
.btn-kamera:active{transform:translateY(3px);border-bottom-width:1px}

/* ── Carian & Pilihan Pesilat ── */
.pilih-wrap{position:relative}
.pilih-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:18px}
.pilih-input{width:100%;padding:11px 12px 11px 40px;border:2px solid rgba(255,215,0,.3);border-radius:var(--rad-sm);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:700;outline:none;transition:.2s}
.pilih-input:focus{border-color:var(--gold)}
.senarai-carian{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:2px solid rgba(255,215,0,.3);border-radius:var(--rad-sm);max-height:200px;overflow-y:auto;z-index:50;display:none}
.senarai-carian.buka{display:block}
.item-carian{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-weight:700;transition:.15s}
.item-carian:hover{background:rgba(255,215,0,.1)}
.item-carian:last-child{border-bottom:none}
.item-carian .sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Profil Dipilih ── */
#profil-dipilih{display:none;background:rgba(41,121,255,.15);border:2px solid rgba(41,121,255,.4);border-radius:var(--rad-sm);padding:12px;margin-top:8px}
.profil-nm{font-family:var(--font-h);font-size:14px;color:#fff;margin-bottom:2px}
.profil-sub{font-size:12px;color:var(--muted)}
.bengkung-tag{display:inline-block;background:linear-gradient(135deg,var(--blue),var(--purple));padding:3px 12px;border-radius:99px;font-size:11px;font-weight:800;margin-top:6px}

/* ── Item Penilaian ── */
.item-nilai{background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:var(--rad-sm);padding:12px;margin-bottom:8px}
.item-nilai-nama{font-weight:800;font-size:14px;margin-bottom:10px;color:#fff}
.status-btn-group{display:flex;gap:6px}
.status-btn{flex:1;padding:8px 6px;border-radius:8px;font-family:var(--font-h);font-size:11px;text-align:center;cursor:pointer;transition:.1s;border:2px solid transparent;border-bottom-width:3px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.06)}
.status-btn.aktif-lemah{background:linear-gradient(135deg,#FF5177,var(--red));color:#fff;border-color:rgba(255,255,255,.3);box-shadow:var(--red-s)}
.status-btn.aktif-sederhana{background:linear-gradient(135deg,#FF8C42,var(--orange));color:#fff;border-color:rgba(255,255,255,.3);box-shadow:var(--orange-s)}
.status-btn.aktif-cemerlang{background:linear-gradient(135deg,#00E676,var(--green));color:#fff;border-color:rgba(255,255,255,.3);box-shadow:var(--green-s)}
.status-btn:active{transform:translateY(2px);border-bottom-width:1px}
.btn-padam-item{background:none;border:none;color:rgba(255,100,100,.6);font-size:16px;cursor:pointer;padding:4px;margin-left:8px;float:right}

/* ── Tambah Item ── */
.btn-tambah-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.2);border-radius:var(--rad-sm);color:var(--muted);font-weight:700;cursor:pointer;width:100%;justify-content:center;transition:.15s}
.btn-tambah-item:hover{border-color:var(--gold);color:var(--gold)}

/* ── Skor ── */
#panel-skor{text-align:center;padding:16px;background:rgba(255,215,0,.08);border:2px solid rgba(255,215,0,.3);border-radius:var(--rad);margin:12px 14px 0}
.skor-num{font-family:var(--font-h);font-size:36px;color:var(--gold)}
.skor-bar{height:10px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin:10px 0}
.skor-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:99px;transition:.5s}

/* ── Form ── */
.form-kump{margin-bottom:12px}
.form-lbl{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-inp{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:var(--rad-sm);font-size:14px;font-weight:700;color:#fff;background:rgba(255,255,255,.08);outline:none;transition:.2s}
.form-inp:focus{border-color:var(--gold)}
select.form-inp option{background:#1A0A3E}
select.form-inp{appearance:none}
textarea.form-inp{resize:vertical;min-height:80px}

/* ── Bakat Buttons ── */
.bakat-group{display:flex;gap:8px;flex-wrap:wrap}
.bakat-btn{flex:1;min-width:120px;padding:10px;border-radius:var(--rad-sm);font-family:var(--font-h);font-size:12px;text-align:center;cursor:pointer;transition:.1s;border:2px solid var(--border);border-bottom-width:3px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.05)}
.bakat-btn.aktif{color:#fff;border-color:rgba(255,255,255,.3)}
.bakat-seni.aktif{background:linear-gradient(135deg,#CC44FF,var(--purple));box-shadow:var(--purple-s)}
.bakat-olah.aktif{background:linear-gradient(135deg,#448AFF,var(--blue));box-shadow:var(--blue-s)}
.bakat-dua.aktif{background:linear-gradient(135deg,#00E676,var(--green));box-shadow:var(--green-s)}
.bakat-belum.aktif{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.bakat-btn:active{transform:translateY(2px);border-bottom-width:1px}

/* ── Butang Simpan ── */
.btn-simpan{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 28px);margin:16px 14px;padding:14px;background:linear-gradient(135deg,#00E676,var(--green));border:2px solid rgba(255,255,255,.3);border-bottom-width:5px;border-radius:var(--rad);font-family:var(--font-h);font-size:16px;color:#fff;cursor:pointer;box-shadow:var(--green-s);transition:.1s}
.btn-simpan:active{transform:translateY(4px);border-bottom-width:1px}
.btn-simpan:disabled{opacity:.5;cursor:not-allowed}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:2px solid var(--gold);color:var(--gold);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:800;z-index:999;opacity:0;transition:.3s;white-space:nowrap;max-width:90vw;box-shadow:0 8px 0 rgba(0,0,0,.3)}
#toast.nampak{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.ralat{border-color:var(--red);color:var(--red)}

/* ── Loading ── */
.muat{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--muted)}
.muat i{animation:spin 1s linear infinite;color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <a href="index.html" class="hdr-btn"><i class="ti ti-arrow-left"></i></a>
    <h1>📋 Laporan Pesilat</h1>
  </header>

  <!-- Pilih Pesilat -->
  <div class="kad">
    <div class="kad-tajuk"><i class="ti ti-search"></i> Pilih Pesilat</div>
    <div class="pilih-wrap">
      <i class="ti ti-user"></i>
      <input class="pilih-input" id="inp-cari" type="text" placeholder="Taip nama atau No. KP..." autocomplete="off"
        oninput="cariPesilat(this.value)" onfocus="tunjukSenarai()">
      <div class="senarai-carian" id="senarai-carian"></div>
    </div>
    <div id="profil-dipilih">
      <div style="display:flex;gap:10px;align-items:center">
        <div id="avatar-dipilih" style="width:48px;height:48px;border-radius:10px;background:rgba(41,121,255,.3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🥷</div>
        <div>
          <div class="profil-nm" id="nama-dipilih">—</div>
          <div class="profil-sub" id="kp-dipilih">—</div>
          <div class="bengkung-tag" id="bengkung-dipilih">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gambar Pesilat -->
  <div class="kad">
    <div class="kad-tajuk"><i class="ti ti-camera"></i> Gambar Pesilat</div>
    <div id="kotak-gambar">
      <div id="pratonton-gambar"><span id="gambar-placeholder">📷</span></div>
      <button class="btn-kamera" onclick="ambilGambar()"><i class="ti ti-camera"></i> Ambil / Tukar Gambar</button>
      <input type="file" id="inp-kamera" accept="image/*" capture="environment" style="display:none" onchange="prosesGambar(this)">
      <div style="font-size:11px;color:var(--muted);text-align:center">Atau upload dari galeri telefon</div>
    </div>
  </div>

  <!-- Item Penilaian -->
  <div class="kad">
    <div class="kad-tajuk"><i class="ti ti-clipboard-check"></i> Penilaian Penguasaan</div>
    <div id="senarai-item">
      <div class="muat"><i class="ti ti-loader-2"></i> Pilih pesilat dulu...</div>
    </div>
    <button class="btn-tambah-item" onclick="tambahItemBaru()">
      <i class="ti ti-plus"></i> Tambah Item Penilaian
    </button>
  </div>

  <!-- Skor Auto -->
  <div id="panel-skor">
    <div class="skor-num"><span id="skor-val">0</span> / <span id="skor-max">0</span></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Jumlah Markah</div>
    <div class="skor-bar"><div class="skor-fill" id="skor-bar" style="width:0%"></div></div>
    <div style="font-family:'Lilita One';font-size:20px;color:var(--gold)" id="skor-peratus">0%</div>
  </div>

  <!-- Bakat & Catatan -->
  <div class="kad">
    <div class="kad-tajuk"><i class="ti ti-star"></i> Bakat sebagai Atlet</div>
    <div class="bakat-group" id="bakat-group">
      <div class="bakat-btn bakat-seni" onclick="pilihBakat('SILAT SENI',this)">🌸 Silat Seni</div>
      <div class="bakat-btn bakat-olah" onclick="pilihBakat('OLAHRAGA',this)">⚡ Olahraga</div>
      <div class="bakat-btn bakat-dua" onclick="pilihBakat('KEDUA-DUANYA',this)">🏆 Kedua-dua</div>
      <div class="bakat-btn bakat-belum aktif" onclick="pilihBakat('BELUM DIKENALPASTI',this)">❓ Belum Pasti</div>
    </div>
  </div>

  <div class="kad">
    <div class="kad-tajuk"><i class="ti ti-notes"></i> Catatan Guru</div>
    <textarea class="form-inp" id="catatan-guru" rows="3" placeholder="Pemerhatian, cadangan, nota perkembangan..."></textarea>
  </div>

  <button class="btn-simpan" id="btn-simpan" onclick="simpanLaporan()">
    <i class="ti ti-device-floppy"></i> Simpan Laporan
  </button>
</div>

<div id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwa_ufSBoY9VsNt2K-vFdmpcIFFgfigAjpyNVI0fxl10TRsn8dFdUQVPlldr6NNPAEmOg/exec';

let semuaAhli = [], pesilat = null, semuaItem = [], statusItem = {}, bakats = 'BELUM DIKENALPASTI', fotoBase64 = '';

// ── API JSONP ─────────────────────────────────────────────────
function api(tindakan, params={}) {
  return new Promise((res, rej) => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const url = new URL(API_URL);
    url.searchParams.set('tindakan', tindakan);
    url.searchParams.set('callback', cb);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v)));
    const t = setTimeout(() => { delete window[cb]; document.getElementById(cb)?.remove(); rej(new Error('Masa tamat')); }, 20000);
    window[cb] = (json) => { clearTimeout(t); delete window[cb]; document.getElementById(cb)?.remove(); json.ok ? res(json.data) : rej(new Error(json.error)); };
    const s = document.createElement('script');
    s.id = cb; s.src = url.toString();
    s.onerror = () => { clearTimeout(t); delete window[cb]; s.remove(); rej(new Error('Gagal sambung')); };
    document.head.appendChild(s);
  });
}
function apiPost(data) {
  return new Promise((res, rej) => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const url = new URL(API_URL);
    url.searchParams.set('callback', cb);
    url.searchParams.set('_data', JSON.stringify(data));
    const t = setTimeout(() => { delete window[cb]; document.getElementById(cb)?.remove(); rej(new Error('Masa tamat')); }, 30000);
    window[cb] = (json) => { clearTimeout(t); delete window[cb]; document.getElementById(cb)?.remove(); json.ok ? res(json.data) : rej(new Error(json.error)); };
    const s = document.createElement('script');
    s.id = cb; s.src = url.toString();
    s.onerror = () => { clearTimeout(t); delete window[cb]; s.remove(); rej(new Error('Gagal hantar')); };
    document.head.appendChild(s);
  });
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function tunjukToast(msg, jenis='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'nampak '+jenis;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className='', 3000);
}

// ── Load pesilat ──────────────────────────────────────────────
async function init() {
  try { semuaAhli = await api('senarai_ahli', {status:'AKTIF'}); } catch(e) {}
}
init();

// ── Carian ────────────────────────────────────────────────────
let timerCari;
function cariPesilat(q) {
  clearTimeout(timerCari);
  timerCari = setTimeout(() => {
    const senarai = document.getElementById('senarai-carian');
    if (!q) { senarai.classList.remove('buka'); return; }
    const hasil = semuaAhli.filter(a => a.nama.toLowerCase().includes(q.toLowerCase()) || a.no_kp.includes(q)).slice(0, 8);
    if (!hasil.length) { senarai.classList.remove('buka'); return; }
    senarai.innerHTML = hasil.map(a => `
      <div class="item-carian" onclick="pilihPesilat('${a.no_kp}')">
        ${a.nama}
        <div class="sub">${a.no_kp} · ${(a.bengkung||'').replace('BENGKUNG ','')}</div>
      </div>`).join('');
    senarai.classList.add('buka');
  }, 250);
}

function tunjukSenarai() {
  const q = document.getElementById('inp-cari').value;
  if (q) cariPesilat(q);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#senarai-carian') && !e.target.closest('#inp-cari')) {
    document.getElementById('senarai-carian').classList.remove('buka');
  }
});

async function pilihPesilat(noKp) {
  pesilat = semuaAhli.find(a => a.no_kp === noKp);
  if (!pesilat) return;
  document.getElementById('senarai-carian').classList.remove('buka');
  document.getElementById('inp-cari').value = pesilat.nama;

  // Tunjuk profil
  document.getElementById('profil-dipilih').style.display = 'block';
  document.getElementById('nama-dipilih').textContent = pesilat.nama;
  document.getElementById('kp-dipilih').textContent = pesilat.no_kp;
  document.getElementById('bengkung-dipilih').textContent = pesilat.bengkung || '—';

  // Load gambar sedia ada jika ada
  try {
    const profil = await api('profil_ahli', {no_kp: noKp});
    if (profil.FOTO_BASE64 && profil.FOTO_BASE64.length > 10) {
      paparGambar(profil.FOTO_BASE64);
    }
  } catch(e) {}

  // Load item penilaian
  await loadItemPenilaian(pesilat.bengkung);
}

async function loadItemPenilaian(bengkung) {
  const el = document.getElementById('senarai-item');
  el.innerHTML = '<div class="muat"><i class="ti ti-loader-2"></i> Memuatkan item...</div>';
  statusItem = {};
  try {
    semuaItem = await api('item_penilaian', {bengkung});
    if (!semuaItem.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">Tiada item penilaian untuk bengkung ini.<br>Bos boleh tambah item di bawah.</div>';
    } else {
      renderItem();
    }
  } catch(e) {
    el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:16px">Gagal muatkan item</div>';
  }
}

function renderItem() {
  const el = document.getElementById('senarai-item');
  el.innerHTML = semuaItem.map((item, i) => `
    <div class="item-nilai" id="item-${i}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div class="item-nilai-nama">${i+1}. ${item.NAMA_ITEM || item}</div>
        <button class="btn-padam-item" onclick="padamItem(${i})" title="Padam item ini">✕</button>
      </div>
      <div class="status-btn-group">
        <div class="status-btn ${statusItem[i]==='LEMAH'?'aktif-lemah':''}" onclick="tetapStatus(${i},'LEMAH',this)">😟 Lemah</div>
        <div class="status-btn ${statusItem[i]==='SEDERHANA'?'aktif-sederhana':''}" onclick="tetapStatus(${i},'SEDERHANA',this)">🙂 Sederhana</div>
        <div class="status-btn ${statusItem[i]==='CEMERLANG'?'aktif-cemerlang':''}" onclick="tetapStatus(${i},'CEMERLANG',this)">🌟 Cemerlang</div>
      </div>
    </div>`).join('');
  kiraSkor();
}

function tetapStatus(idx, status, el) {
  statusItem[idx] = status;
  const grup = el.parentElement;
  grup.querySelectorAll('.status-btn').forEach(b => b.className = 'status-btn');
  el.classList.add('aktif-' + status.toLowerCase());
  kiraSkor();
}

function padamItem(idx) {
  semuaItem.splice(idx, 1);
  delete statusItem[idx];
  // Rebuild statusItem indices
  const newStatus = {};
  Object.entries(statusItem).forEach(([k,v]) => { if(parseInt(k) < idx) newStatus[k]=v; else if(parseInt(k) > idx) newStatus[parseInt(k)-1]=v; });
  statusItem = newStatus;
  renderItem();
}

function tambahItemBaru() {
  const nama = prompt('Nama item penilaian baharu:');
  if (!nama || !nama.trim()) return;
  semuaItem.push({ NAMA_ITEM: nama.trim() });
  renderItem();
  // Scroll ke item baru
  setTimeout(() => {
    const items = document.querySelectorAll('.item-nilai');
    items[items.length-1]?.scrollIntoView({behavior:'smooth'});
  }, 100);
}

function kiraSkor() {
  const markah = { LEMAH:1, SEDERHANA:2, CEMERLANG:3 };
  let jumlah = 0, max = semuaItem.length * 3;
  Object.values(statusItem).forEach(s => { jumlah += markah[s] || 0; });
  const pct = max > 0 ? Math.round(jumlah/max*100) : 0;
  document.getElementById('skor-val').textContent = jumlah;
  document.getElementById('skor-max').textContent = max;
  document.getElementById('skor-bar').style.width = pct + '%';
  document.getElementById('skor-peratus').textContent = pct + '%';
}

// ── Gambar ────────────────────────────────────────────────────
function ambilGambar() { document.getElementById('inp-kamera').click(); }

function prosesGambar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 200; let w=img.width, h=img.height;
      if(w>h){h=Math.round(h*(MAX/w));w=MAX;}else{w=Math.round(w*(MAX/h));h=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
      paparGambar(fotoBase64);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function paparGambar(base64) {
  const kotak = document.getElementById('pratonton-gambar');
  kotak.innerHTML = `<img src="${base64}" alt="Gambar pesilat">`;
  fotoBase64 = base64;
}

// ── Bakat ─────────────────────────────────────────────────────
function pilihBakat(nilai, el) {
  bakats = nilai;
  document.querySelectorAll('.bakat-btn').forEach(b => b.classList.remove('aktif'));
  el.classList.add('aktif');
}

// ── Simpan ────────────────────────────────────────────────────
async function simpanLaporan() {
  if (!pesilat) { tunjukToast('Pilih pesilat dulu!', 'ralat'); return; }
  if (Object.keys(statusItem).length === 0) {
    if (!confirm('Tiada item penilaian yang ditandakan. Teruskan simpan?')) return;
  }

  const btn = document.getElementById('btn-simpan');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Menyimpan...';

  const markah = { LEMAH:1, SEDERHANA:2, CEMERLANG:3 };
  let jumlah = 0, max = semuaItem.length * 3;
  const itemDetail = semuaItem.map((item, i) => ({
    nama: item.NAMA_ITEM || item,
    status: statusItem[i] || 'TIADA',
    markah: markah[statusItem[i]] || 0
  }));
  itemDetail.forEach(d => { jumlah += d.markah; });

  try {
    // Simpan laporan
    await apiPost({
      tindakan: 'simpan_laporan',
      no_kp: pesilat.no_kp,
      bengkung_semasa: pesilat.bengkung,
      bakat: bakats,
      jumlah_markah: jumlah,
      markah_max: max,
      peratus: max>0 ? Math.round(jumlah/max*100) : 0,
      catatan: document.getElementById('catatan-guru').value,
      item_detail: itemDetail,
      foto_base64: fotoBase64,
    });

    tunjukToast('✅ Laporan berjaya disimpan!', 'ok');
    setTimeout(() => window.location.href = 'index.html', 1500);
  } catch(e) {
    tunjukToast('Gagal: ' + e.message, 'ralat');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Simpan Laporan';
  }
}
</script>
</body>
